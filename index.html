<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio FIT — Registro de Ingreso</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #020d1a;
    --bg-mid: #041424;
    --grid-color: rgba(0, 200, 255, 0.04);
    --cyan: #00c8ff;
    --cyan-dim: rgba(0, 200, 255, 0.15);
    --cyan-glow: rgba(0, 200, 255, 0.6);
    --green: #00ff9d;
    --green-dim: rgba(0, 255, 157, 0.12);
    --red: #ff3c5a;
    --red-dim: rgba(255, 60, 90, 0.12);
    --amber: #ffb800;
    --text-main: #cce8f4;
    --text-dim: #5a8fa8;
    --border: rgba(0, 200, 255, 0.2);
    --border-bright: rgba(0, 200, 255, 0.5);
    --card-bg: rgba(4, 20, 36, 0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background-color: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── ANIMATED BACKGROUND ─── */
  .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .grid-overlay {
    position: absolute; inset: 0;
    background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 8s ease-in-out infinite;
  }
  @keyframes gridPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

  .scanline { position: fixed; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.15; animation: scan 6s linear infinite; z-index: 1; }
  @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

  /* ─── LAYOUT ─── */
  .page { display: none; }
  .page.active { display: flex; flex-direction: column; min-height: 100vh; }
  .container { position: relative; z-index: 10; max-width: 820px; margin: 0 auto; padding: 24px 16px 80px; width: 100%; }

  /* ─── HEADER ─── */
  .header { text-align: center; padding: 32px 0 24px; position: relative; z-index: 10; }
  .header h1 { font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(22px, 5vw, 38px); color: #fff; text-shadow: 0 0 30px var(--cyan-glow); }
  .header h1 span { color: var(--cyan); }
  .header-badge { display: inline-block; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); background: var(--cyan-dim); border: 1px solid var(--border); padding: 4px 14px; letter-spacing: 3px; margin-bottom: 12px; }

  /* ─── CARDS ─── */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 24px; margin-bottom: 18px; backdrop-filter: blur(12px); }
  .card-title { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--cyan); }
  
  /* ─── FORM ELEMENTS ─── */
  .field-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
  label { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); }
  input { background: rgba(0, 200, 255, 0.03); border: 1px solid var(--border); border-radius: 4px; color: #fff; padding: 12px; outline: none; width: 100%; }
  input:focus { border-color: var(--cyan); }
  
  .radio-group { display: flex; gap: 10px; margin-top: 10px; }
  .radio-option { cursor: pointer; padding: 10px; border: 1px solid var(--border); border-radius: 4px; flex: 1; text-align: center; font-size: 14px; }
  .selected-si { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .selected-no { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .selected-raro { border-color: var(--amber); color: var(--amber); background: rgba(255,184,0,0.1); }

  /* ─── BUTTONS ─── */
  .btn-primary { font-family: 'Orbitron', monospace; background: var(--cyan); color: var(--bg-deep); border: none; padding: 14px 32px; border-radius: 4px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 10px; }
  .btn-send { background: var(--green); }

  /* ─── SUCCESS ─── */
  .success-screen { text-align: center; padding: 50px 20px; z-index: 10; position: relative; }
  .success-data-box { background: var(--card-bg); border: 1px solid var(--border-bright); padding: 20px; margin: 20px auto; max-width: 400px; text-align: left; font-family: 'Share Tech Mono', monospace; }
</style>
</head>
<body>

<div class="bg-layer"><div class="grid-overlay"></div></div>
<div class="scanline"></div>

<div class="page active" id="page1">
  <div class="header">
    <div class="header-badge">// SISTEMA DE CONTROL — LAB FIT</div>
    <h1>LABORATORIO <span>FIT</span></h1>
  </div>
  <div class="container">
    <div class="card">
      <div class="card-title">🛡️ NORMAS OBLIGATORIAS</div>
      <p>1. Uso de bata obligatoria.</p>
      <p>2. Zapato cerrado.</p>
      <p>3. No alimentos ni bebidas.</p>
      <button class="btn-primary" onclick="showPage('page2')">ENTENDIDO, IR AL REGISTRO</button>
    </div>
  </div>
</div>

<div class="page" id="page2">
  <div class="container">
    <div class="card">
      <div class="card-title">📝 DATOS DE INGRESO</div>
      <div class="field-group">
        <label>NOMBRE COMPLETO</label>
        <input type="text" id="nombre" placeholder="Nombre Apellido" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
      </div>
      <div class="field-group">
        <label>NÚMERO DE RU</label>
        <input type="number" id="ru" placeholder="Ej: 12345">
      </div>
      <div class="field-group">
        <label>HORA ENTRADA / SALIDA</label>
        <div style="display:flex; gap:10px;">
          <input type="time" id="entrada">
          <input type="time" id="salida">
        </div>
      </div>
      <div class="field-group">
        <label>N° PC (OPCIONAL)</label>
        <input type="number" id="num-pc">
      </div>
      <label>¿ESTADO DEL EQUIPO?</label>
      <div class="radio-group">
        <div class="radio-option" id="opt-si" onclick="selectOption('si')">ERROR</div>
        <div class="radio-option" id="opt-no" onclick="selectOption('no')">TODO BIEN</div>
      </div>
      <button class="btn-primary btn-send" onclick="enviarFormulario()">ENVIAR REGISTRO ✓</button>
    </div>
  </div>
</div>

<div class="page" id="page3">
  <div class="success-screen">
    <h1 style="color:var(--green)">¡ENVIADO!</h1>
    <div class="success-data-box" id="success-summary"></div>
    <button class="btn-primary" onclick="location.reload()">NUEVO REGISTRO</button>
  </div>
</div>

<script>
  let selectedOption = null;
  function selectOption(val) {
    selectedOption = val;
    document.getElementById('opt-si').className = 'radio-option' + (val==='si'?' selected-si':'');
    document.getElementById('opt-no').className = 'radio-option' + (val==='no'?' selected-no':'');
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ID de tu foto: xjgaqoqr
  const FORMSPREE_URL = 'https://formspree.io/f/xjgaqoqr'; 

  function enviarFormulario() {
    const nombre = document.getElementById('nombre').value;
    const ru = document.getElementById('ru').value;
    
    if(!nombre || !ru) return alert("Por favor llena Nombre y RU");

    const datos = {
      nombre: nombre,
      ru: ru,
      entrada: document.getElementById('entrada').value,
      salida: document.getElementById('salida').value,
      pc: document.getElementById('num-pc').value || 'N/A',
      estado: selectedOption || 'No reportado'
    };

    fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify(datos)
    });

    document.getElementById('success-summary').innerHTML = `
      <p><b>Usuario:</b> ${nombre}</p>
      <p><b>RU:</b> ${ru}</p>
      <p><b>Estado:</b> Registro recibido en Biomedicina</p>
    `;
    showPage('page3');
  }
</script>
</body>
</html>s
